    <script>
      try {
        var t = localStorage.getItem('swebservices-theme');
        var isDark = t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.toggle('dark', isDark);
